# Conda environment for TB Drug Discovery
# Provides reproducible environment specification

name: tb-drug-discovery
channels:
  - conda-forge
  - pytorch
  - pyg
  - defaults

dependencies:
  # Core Python
  - python=3.10
  - pip

  # Scientific computing
  - numpy=1.26.0
  - pandas=2.1.0
  - scipy=1.11.0
  - scikit-learn=1.3.0

  # Deep Learning
  - pytorch=2.1.0
  - pytorch-cuda=11.8  # Remove for CPU-only installation
  - pyg=2.4.0  # PyTorch Geometric

  # Chemistry
  - rdkit=2023.09.5

  # Visualization
  - matplotlib=3.8.0
  - seaborn=0.13.0

  # Jupyter
  - jupyter=1.0.0
  - ipykernel=6.27.0

  # Development tools
  - pytest=7.4.0
  - pytest-cov=4.1.0
  - black=23.12.0
  - isort=5.13.0
  - flake8=7.0.0
  - mypy=1.7.0

  # Additional pip packages
  - pip:
    # ChEMBL data access
    - chembl-webresource-client==0.10.8

    # Logging
    - loguru==0.7.2

    # Configuration
    - pydantic==2.5.0
    - pyyaml==6.0.1

    # Web API
    - fastapi==0.109.0
    - uvicorn[standard]==0.27.0

    # MLOps
    - mlflow==2.10.0
    - optuna==3.5.0

    # Testing
    - hypothesis==6.100.0

    # Interpretability
    - shap==0.44.0

    # Progress bars
    - tqdm==4.66.0

    # Serialization (safer than pickle)
    - joblib==1.3.2

    # Optional: torch-scatter for efficient GNN operations
    - torch-scatter

    # Additional utilities
    - networkx==3.2.1
    - requests==2.31.0
