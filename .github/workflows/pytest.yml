name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Lint & type-check (fast, no heavy deps)
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('requirements-dev.txt') }}

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check src/ scripts/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ scripts/ tests/

      - name: Mypy (advisory)
        run: |
          pip install numpy pandas scikit-learn loguru pydantic joblib
          mypy src/ --ignore-missing-imports --no-error-summary || true

  # ──────────────────────────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: test-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Unit + integration tests
        run: |
          pytest tests/ -v \
            --cov=src --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_alphafold.py \
            --ignore=tests/test_docking.py \
            --ignore=tests/test_diffusion.py \
            -m "not slow" \
            -x

      - name: Property-based tests (Hypothesis)
        run: |
          pytest tests/test_property_based.py -v \
            --hypothesis-seed=42 \
            || echo "::warning::Property-based tests had failures"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Enforce coverage threshold (65%)
        if: matrix.python-version == '3.11'
        run: coverage report --fail-under=65

  # ──────────────────────────────────────────────────────────────────
  # Security scan
  # ──────────────────────────────────────────────────────────────────
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run bandit
        run: |
          pip install bandit
          bandit -r src/ \
            -x src/models/chemberta.py \
            --severity-level medium \
            --confidence-level medium \
            || echo "::warning::Bandit found potential issues"
